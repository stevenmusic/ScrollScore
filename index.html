const instrumentBuffers = {};   // instKey -> [{midi, buffer}]
const instrumentLoading = {};   // instKey -> Promise

function loadInstrumentSamples(instKey){
  const cfg = REAL_INSTRUMENTS[instKey];
  if (!cfg) return Promise.resolve();
  if (instrumentBuffers[instKey] || instrumentLoading[instKey]) return instrumentLoading[instKey] || Promise.resolve();
  ensureAudio();
  const notes = [["C",0],["Ds",3],["Fs",6],["A",9]];
  const list = [];
  const jobs = [];
  for (let oct = cfg.minOct; oct <= cfg.maxOct; oct++) {
    for (const [letter, idx] of notes) {
      const midi = (oct + 1) * 12 + idx;
      const url = cfg.base ? (cfg.base + letter + oct + ".mp3") : (SAMPLE_BASE + cfg.folder + "/" + letter + oct + ".mp3");
      jobs.push(
        fetch(url).then(r => { if (!r.ok) throw new Error("404"); return r.arrayBuffer(); })
          .then(arr => audioCtx.decodeAudioData(arr))
          .then(buf => { list.push({ midi, buffer: buf }); })
          .catch(() => {}) // 該取樣缺失就跳過,不影響其他音符
      );
    }
  }
  setStatus("載入" + instKey + "真實音色中…");
  instrumentLoading[instKey] = Promise.all(jobs).then(() => {
    instrumentBuffers[instKey] = list;
    setStatus(list.length ? "音色就緒(" + list.length + " 個取樣)" : "真實音色載入失敗,暫用合成音色備援");
  });
  return instrumentLoading[instKey];
}

function freqToMidi(freq){ return 69 + 12 * Math.log2(freq / 440); }

/* ── 鋼琴鍵盤視覺化:依樂譜實際音域動態決定範圍,左右手不同顏色 ── */
function isBlackKey(midi){ return [1,3,6,8,10].includes(((midi%12)+12)%12); }
let KB_LOW = 21, KB_HIGH = 108; // 預設A0~C8,載入樂譜後會依實際音域重新計算
let KB_WHITE_KEYS = [], KB_WHITE_IDX = {};
function rebuildKeyboardRange(){
  let lowest = Infinity, highest = -Infinity;
  for (const ev of events) {
    for (const n of ev.notes) {
      if (n.drum || !n.freq) continue;
      const m = Math.round(freqToMidi(n.freq));
      if (m < lowest) lowest = m;
      if (m > highest) highest = m;
    }
  }
  if (!isFinite(lowest) || !isFinite(highest)) {
    KB_LOW = 21; KB_HIGH = 108; // 沒有音符資料時,退回完整88鍵
  } else {
    // 兩端都取範圍外最靠近的C(最低音所在八度的C,最高音上面那個八度的C)
    KB_LOW = Math.floor(lowest / 12) * 12;
    KB_HIGH = Math.ceil(highest / 12) * 12;
    if (KB_HIGH <= KB_LOW) KB_HIGH = KB_LOW + 12; // 保險,至少留一個八度
  }
  KB_WHITE_KEYS = [];
  for (let m = KB_LOW; m <= KB_HIGH; m++) if (!isBlackKey(m)) KB_WHITE_KEYS.push(m);
  KB_WHITE_IDX = {};
  KB_WHITE_KEYS.forEach((m, i) => KB_WHITE_IDX[m] = i);
}
rebuildKeyboardRange(); // 初始建立(此時還沒有樂譜,會用預設88鍵)

function drawKeyboard(ctx, x, y, w, h, activeMap){
  const whiteW = w / KB_WHITE_KEYS.length;

  // 底板陰影,讓整個鍵盤看起來有深度
  const baseGrad = ctx.createLinearGradient(0, y, 0, y + h);
  baseGrad.addColorStop(0, "#050403");
  baseGrad.addColorStop(1, "#0C0A07");
  ctx.fillStyle = baseGrad;
  ctx.fillRect(x, y, w, h);

  const rr = (cx, cy, cw, ch, r) => {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, r); }
    else { ctx.beginPath(); ctx.rect(cx, cy, cw, ch); }
  };

  // 白鍵:漸層 + 立體邊緣 + 按下時的光暈(觸鍵瞬間更亮,之後轉為持續的普通高亮)
  for (let i = 0; i < KB_WHITE_KEYS.length; i++) {
    const m = KB_WHITE_KEYS[i];
    const kx = x + i * whiteW;
    const kw = whiteW - 1;
    const info = activeMap.get(m);
    const staff = info && info.staff;
    const attack = info && info.attack;
    let baseColor = staff === 2 ? ["#5FE0CE", "#22887A"] : staff === 1 ? ["#FFDA7A", "#C4901A"] : ["#FFFDF6", "#DDD6C4"];
    if (attack) baseColor = staff === 2 ? ["#B6FFF4", "#3FBFAE"] : ["#FFF3CC", "#F2B94B"];
    const g = ctx.createLinearGradient(kx, y, kx, y + h);
    g.addColorStop(0, baseColor[0]);
    g.addColorStop(0.85, baseColor[1]);
    g.addColorStop(1, baseColor[1]);
    if (staff) {
      ctx.save();
      ctx.shadowColor = staff === 2 ? "rgba(63,191,174,0.85)" : "rgba(242,185,75,0.85)";
      ctx.shadowBlur = attack ? 24 : 14;
    }
    rr(kx, y, kw, h, [3, 3, 6, 6]);
    ctx.fillStyle = g;
    ctx.fill();
    if (staff) ctx.restore();
    // 鍵縫陰影
    ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 1;
    rr(kx, y, kw, h, [3, 3, 6, 6]); ctx.stroke();
    // 頂端高光細線,增加立體感
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(kx + 2, y + 1); ctx.lineTo(kx + kw - 2, y + 1); ctx.stroke();
  }

  // 黑鍵:漸層 + 陰影,疊在白鍵上方
  const blackH = h * 0.6, blackW = whiteW * 0.62;
  for (let m = KB_LOW; m <= KB_HIGH; m++) {
    if (!isBlackKey(m)) continue;
    let leftWhite = m - 1;
    while (isBlackKey(leftWhite)) leftWhite--;
    const li = KB_WHITE_IDX[leftWhite];
    if (li === undefined) continue;
    const kx = x + (li + 1) * whiteW - blackW / 2;
    const info = activeMap.get(m);
    const staff = info && info.staff;
    const attack = info && info.attack;
    let baseColor = staff === 2 ? ["#3FBFAE", "#0F5F56"] : staff === 1 ? ["#F2B94B", "#8A6410"] : ["#3a3a3a", "#0a0a0a"];
    if (attack) baseColor = staff === 2 ? ["#8FFFF0", "#22887A"] : staff === 1 ? ["#FFE39A", "#C4901A"] : baseColor;
    // 黑鍵投影到白鍵上
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(kx - 1, y + blackH, blackW + 2, 6);

    const g = ctx.createLinearGradient(kx, y, kx, y + blackH);
    g.addColorStop(0, baseColor[0]);
    g.addColorStop(1, baseColor[1]);
    if (staff) {
      ctx.save();
      ctx.shadowColor = staff === 2 ? "rgba(63,191,174,0.9)" : "rgba(242,185,75,0.9)";
      ctx.shadowBlur = 12;
    }
    rr(kx, y, blackW, blackH, [2, 2, 4, 4]);
    ctx.fillStyle = g;
    ctx.fill();
    if (staff) ctx.restore();
    // 黑鍵頂端光澤
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.fillRect(kx + blackW * 0.15, y + 2, blackW * 0.3, blackH * 0.35);
  }
}

/* 找出某個時間點正在發聲的音符(midi -> staff),供鍵盤高亮使用 */
const KB_MIN_VISUAL_SEC = 0.09; // 最短可視時間,避免極快的音符剛好卡在兩次畫面更新中間而完全沒被畫出來
const KB_ATTACK_SEC = 0.11; // 觸鍵瞬間的閃亮時間,讓連續同音看得出來是分開彈的
let kbScanCursor = 0, kbScanLastSec = -1;
function getActiveNotesAt(sec, calib){
  if (sec < kbScanLastSec - 0.5) kbScanCursor = 0; // 倒退播放(重新開始/跳轉),重置游標
  kbScanLastSec = sec;
  const map = new Map();
  const noteEndSec = (ev, n, t0) => {
    const rollT = (n.rollIndex || 0) * computeArpEffectiveGap(ev, t0, calib);
    const writtenEnd = calib ? calibToSec(ev.tWhole + n.durWhole) : wholeToSec(ev.tWhole + n.durWhole);
    return Math.max(writtenEnd + rollT, t0 + rollT + KB_MIN_VISUAL_SEC);
  };
  // 游標只往前推進,跳過已經完全結束(連最短可視時間都過了)的事件,
  // 避免每一幀都要從頭掃過整首樂曲,曲子越長、播到越後面才不會越算越久
  while (kbScanCursor < events.length) {
    const ev = events[kbScanCursor];
    const t0 = calib ? calibToSec(ev.tWhole) : wholeToSec(ev.tWhole);
    if (t0 >= sec) break;
    let allExpired = true;
    for (const n of ev.notes) {
      if (n.drum || !n.freq) continue;
      if (noteEndSec(ev, n, t0) > sec) { allExpired = false; break; }
    }
    if (!allExpired) break;
    kbScanCursor++;
  }
  for (let i = kbScanCursor; i < events.length; i++) {
    const ev = events[i];
    const t0 = calib ? calibToSec(ev.tWhole) : wholeToSec(ev.tWhole);
    if (t0 > sec) break;
    for (const n of ev.notes) {
      if (n.drum || !n.freq) continue;
      const rollT = (n.rollIndex || 0) * computeArpEffectiveGap(ev, t0, calib);
      const t = t0 + rollT;
      const endSec = noteEndSec(ev, n, t0);
      if (sec >= t && sec < endSec) {
        const midi = Math.round(freqToMidi(n.freq));
        const isAttack = (sec - t) < KB_ATTACK_SEC;
        const existing = map.get(midi);
        if (!existing || (isAttack && !existing.attack)) {
          map.set(midi, { staff: n.staff || 1, attack: isAttack });
        }
      }
    }
  }
  return map;
}

function resizeKeyboardCanvas(){
  const cv = $("keyboardCanvas");
  if (!cv) return;
  const rect = cv.getBoundingClientRect();
  cv.width = Math.round(rect.width);
  cv.height = Math.round(rect.height);
}
const KB_LOOKAHEAD_SEC = 0.06; // 鍵盤提前量,補償視覺感知上的延遲感
function drawKeyboardLive(sec){
  const cv = $("keyboardCanvas");
  if (!cv || !cv.width) return;
  const ctx = cv.getContext("2d");
  ctx.clearRect(0, 0, cv.width, cv.height);
  const active = events.length ? getActiveNotesAt(sec + KB_LOOKAHEAD_SEC, useCalib()) : new Map();
  drawKeyboard(ctx, 0, 0, cv.width, cv.height, active);
}
window.addEventListener("resize", () => { resizeKeyboardCanvas(); drawKeyboardLive(playing ? currentSec() : pausedAtSec); });

/* 找最接近的取樣,用 playbackRate 補足音高差(標準取樣器做法) */
function nearestSample(list, targetMidi){
  let best = list[0], bestDist = Infinity;
  for (const s of list) {
    const dist = Math.abs(s.midi - targetMidi);
    if (dist < bestDist) { bestDist = dist; best = s; }
  }
  return best;
}
/* ── 演奏記號(articulation)套用:重音類調整音量,斷奏類/保持音/延長記號調整時值 ── */
function applyArticulation(sustain, peakGain, dur, artic){
  if (!artic) return { sustain, peakGain };
  let s = sustain, g = peakGain;
  if (artic.staccatissimo) s = dur * 0.25;       // 極斷奏:非常短
  else if (artic.spiccato) s = dur * 0.3;        // 跳弓/輕巧斷音:很短
  else if (artic.staccato) s = dur * 0.5;        // 斷奏:縮短到約一半
  else if (artic.detachedLegato) s = dur * 0.75; // 半斷音(斷奏+保持音的折衷):稍微縮短
  if (artic.tenuto) s = Math.max(s, dur * 0.98); // 保持音:確保彈滿全部時值,不被縮短
  if (artic.fermata) s = s * 1.8;                // 延長記號:明顯拉長
  if (artic.strongAccent) g = g * 1.5;           // 強音記號(marcato):音量大幅加強
  else if (artic.accent) g = g * 1.3;            // 重音:音量加強
  else if (artic.softAccent) g = g * 1.15;       // 次強音:小幅加強
  return { sustain: s, peakGain: g };
}

function playSampledInstrument(instKey, freq, when, dur, legato, pedal, chordAnchors, harmonyEndSec, artic){
  const list = instrumentBuffers[instKey];
  if (!list || !list.length) return false;
  const targetMidi = freqToMidi(freq);
  const pitchClass = ((Math.round(targetMidi) % 12) + 12) % 12;
  let best;
  // 同一組和絃裡,同音名(差整數個八度)的音優先共用同一份錄音,讓八度關係更精確;
  // 但如果共用會讓變速幅度過大(音色明顯失真、聽起來像機器人),就放棄共用,改用各自最近的錄音
  const SHARE_SHIFT_LIMIT = 4; // 半音,超過這個幅度共用弊大於利
  if (chordAnchors && chordAnchors[pitchClass] && Math.abs(targetMidi - chordAnchors[pitchClass].midi) <= SHARE_SHIFT_LIMIT) {
    best = chordAnchors[pitchClass];
  } else {
    best = nearestSample(list, targetMidi);
    if (chordAnchors && !chordAnchors[pitchClass]) chordAnchors[pitchClass] = best;
  }
  const rate = Math.pow(2, (targetMidi - best.midi) / 12);
  const src = audioCtx.createBufferSource();
  src.buffer = best.buffer;
  src.playbackRate.value = rate;
  const g = audioCtx.createGain();
  let sustain, tail, holdRatio = 0.6, peakGain = 0.6;
  if (harmonyEndSec != null) {
    // 撐滿整個和聲/圓滑線範圍的實際長度,而不是只加一段固定的尾音
    sustain = Math.max(harmonyEndSec - when, dur, 0.1);
    if (pedal) {
      // 踏板踩著時飽滿延續,但放開的瞬間阻尼器動作其實很快(約0.15秒),
      // 不能拖太長,否則前一個和聲會糊進下一個和聲裡
      tail = 0.18;
      holdRatio = 0.9;
      peakGain = 0.66;
    } else {
      tail = 0.3;
    }
  } else {
    sustain = Math.max(dur, 0.1);
    tail = 0.4;
    if (pedal) { tail = 0.18; holdRatio = 0.9; peakGain = 0.66; }
    else if (legato) tail = 0.6;
  }
  ({ sustain, peakGain } = applyArticulation(sustain, peakGain, dur, artic));
  // 取樣本身錄音長度可能比需要的延音短,加上尾段循環撐住聲音
  const neededSec = (sustain + tail) * rate; // 換算成取樣原始時間軸(playbackRate影響消耗速度)
  const bufDur = best.buffer.duration;
  if (bufDur < neededSec && bufDur > 0.3) {
    src.loop = true;
    const loopLen = Math.min(0.6, bufDur * 0.3);
    src.loopStart = Math.max(0, bufDur - loopLen);
    src.loopEnd = bufDur;
  }
  g.gain.setValueAtTime(peakGain, when);
  g.gain.setValueAtTime(peakGain, when + sustain * holdRatio);
  g.gain.exponentialRampToValueAtTime(0.0001, when + sustain + tail);
  src.connect(g); g.connect(masterGain);
  src.start(when);
  const stopAt = when + sustain + tail + 0.1;
  src.stop(stopAt);
  scheduled.push(src);
  return true;
}

function scheduleNote(freq, when, dur, legato, pedal, chordAnchors, harmonyEndSec, artic){
  if (!$("legatoPedal").checked) { legato = false; pedal = false; harmonyEndSec = null; }
  const inst = currentInstrument();
  if (REAL_INSTRUMENTS[inst] && playSampledInstrument(inst, freq, when, dur, legato, pedal, chordAnchors, harmonyEndSec, artic)) return;
  // 真實取樣尚未載入完成或缺失時,退回合成音色,絕不會沒有聲音
  switch (inst) {
    case "strings":  scheduleStrings(freq, when, dur); break;
    case "cello":    scheduleStrings(freq, when, dur); break;
    case "flute":    scheduleFlute(freq, when, dur); break;
    case "guitar":   scheduleGuitar(freq, when, dur); break;
    case "guitarnylon": scheduleGuitar(freq, when, dur); break;
    case "clarinet": scheduleClarinet(freq, when, dur); break;
    default:         schedulePiano(freq, when, dur, legato, pedal, harmonyEndSec, artic);
  }
}

$("instrument").addEventListener("change", () => { ensureAudio(); loadInstrumentSamples(currentInstrument()); });

function schedulePiano(freq, when, dur, legato, pedal, harmonyEndSec, artic){
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const lp = audioCtx.createBiquadFilter();
  osc.type = "triangle"; osc.frequency.value = freq;
  osc2.type = "sine";    osc2.frequency.value = freq * 2; // 一點泛音
  lp.type = "lowpass";   lp.frequency.value = Math.min(freq * 6, 8000);
  const g2 = audioCtx.createGain(); g2.gain.value = 0.18;
  let peak = 0.32;
  let sustain, releaseTail;
  if (harmonyEndSec != null) {
    sustain = Math.max(harmonyEndSec - when, dur * 0.9, 0.08);
    releaseTail = pedal ? 0.18 : 0.3; // 踏板放開瞬間阻尼器動作快,不能拖太長否則混濁
  } else {
    sustain = Math.max(dur * 0.9, 0.08);
    releaseTail = 0.25;
    if (pedal) { sustain = Math.max(dur * 1.3, 0.08); releaseTail = 0.18; }
    else if (legato) { sustain = Math.max(dur * 1.15, 0.08); releaseTail = 0.35; }
  }
  ({ sustain, peakGain: peak } = applyArticulation(sustain, peak, dur, artic));
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(peak, when + 0.012);
  g.gain.setValueAtTime(peak, when + Math.max(sustain, 0.02)); // 保持住音量,彈滿時值,不要提早衰減
  g.gain.exponentialRampToValueAtTime(0.0001, when + sustain + releaseTail);
  osc.connect(lp); osc2.connect(g2); g2.connect(lp);
  lp.connect(g); g.connect(masterGain);
  osc.start(when); osc2.start(when);
  const stopAt = when + sustain + releaseTail + 0.05;
  osc.stop(stopAt); osc2.stop(stopAt);
  scheduled.push(osc, osc2);
}

/* 弦樂:兩個微調頻鋸齒波製造厚度,慢起音,低通柔化高頻鋸齒噪聲 */
function scheduleStrings(freq, when, dur){
  const g = audioCtx.createGain();
  const lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = Math.min(freq * 5, 6000); lp.Q.value = 0.7;
  const sustain = Math.max(dur, 0.15);
  const attack = Math.min(0.09, sustain * 0.35);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(0.28, when + attack);
  g.gain.setValueAtTime(0.28, when + Math.max(sustain - 0.12, attack));
  g.gain.exponentialRampToValueAtTime(0.0001, when + sustain + 0.35);
  const detunes = [-6, 0, 6];
  const oscs = [];
  for (const d of detunes) {
    const o = audioCtx.createOscillator();
    o.type = "sawtooth"; o.frequency.value = freq; o.detune.value = d;
    o.connect(lp); o.start(when); o.stop(when + sustain + 0.4);
    oscs.push(o);
  }
  lp.connect(g); g.connect(masterGain);
  scheduled.push(...oscs);
}

/* 長笛:正弦波為主 + 微量高頻噪聲模擬氣音,柔軟包絡 */
function scheduleFlute(freq, when, dur){
  const g = audioCtx.createGain();
  const sustain = Math.max(dur, 0.12);
  const attack = Math.min(0.06, sustain * 0.4);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(0.34, when + attack);
  g.gain.setValueAtTime(0.34, when + Math.max(sustain, attack + 0.01));
  g.gain.exponentialRampToValueAtTime(0.0001, when + sustain + 0.2);
  const o = audioCtx.createOscillator();
  o.type = "sine"; o.frequency.value = freq;
  o.connect(g);
  const o2 = audioCtx.createOscillator();
  o2.type = "sine"; o2.frequency.value = freq * 2; 
  const g2 = audioCtx.createGain(); g2.gain.value = 0.06;
  o2.connect(g2); g2.connect(g);
  // 氣音噪聲層
  const len = Math.floor(audioCtx.sampleRate * (sustain + 0.1));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1);
  const noise = audioCtx.createBufferSource(); noise.buffer = buf;
  const hp = audioCtx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 3500;
  const ng = audioCtx.createGain(); ng.gain.value = 0.02;
  noise.connect(hp); hp.connect(ng); ng.connect(masterGain);
  g.connect(masterGain);
  o.start(when); o2.start(when); noise.start(when);
  const stopAt = when + sustain + 0.3;
  o.stop(stopAt); o2.stop(stopAt); noise.stop(stopAt);
  scheduled.push(o, o2, noise);
}

/* 木吉他/撥奏:快速起音、快速衰減,方波+三角波堆疊高次泛音 */
function scheduleGuitar(freq, when, dur){
  const g = audioCtx.createGain();
  const lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = Math.min(freq * 8, 9000);
  const decay = Math.max(dur * 0.8, 0.3);
  g.gain.setValueAtTime(0.4, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + decay);
  const o = audioCtx.createOscillator();
  o.type = "square"; o.frequency.value = freq;
  const o2 = audioCtx.createOscillator();
  o2.type = "triangle"; o2.frequency.value = freq * 2;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.15;
  o.connect(lp); o2.connect(g2); g2.connect(lp);
  lp.connect(g); g.connect(masterGain);
  o.start(when); o2.start(when);
  const stopAt = when + decay + 0.1;
  o.stop(stopAt); o2.stop(stopAt);
  scheduled.push(o, o2);
}

/* 單簧管:方波為主(奇次泛音特性),中等延音,柔和起音 */
function scheduleClarinet(freq, when, dur){
  const g = audioCtx.createGain();
  const lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = Math.min(freq * 5.5, 6500);
  const sustain = Math.max(dur, 0.14);
  const attack = Math.min(0.05, sustain * 0.3);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(0.3, when + attack);
  g.gain.setValueAtTime(0.3, when + Math.max(sustain - 0.1, attack));
  g.gain.exponentialRampToValueAtTime(0.0001, when + sustain + 0.22);
  const o = audioCtx.createOscillator();
  o.type = "square"; o.frequency.value = freq;
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  o.start(when);
  const stopAt = when + sustain + 0.3;
  o.stop(stopAt);
  scheduled.push(o);
}

/* ── 鼓音色引擎:原聲取樣 + 銅鈸合成 ───────── */
const KIT_URL = "https://tonejs.github.io/audio/drum-samples/acoustic-kit/";
const kitBuffers = {};   // name → AudioBuffer
let kitLoading = null;

function loadDrumKit(){
  if (kitLoading) return kitLoading;
  ensureAudio();
  const files = ["kick","snare","hihat","tom1","tom2","tom3"];
  setStatus("載入鼓音色中…");
  kitLoading = Promise.all(files.map(async name => {
    try {
      const res = await fetch(KIT_URL + name + ".mp3");
      const arr = await res.arrayBuffer();
      kitBuffers[name] = await audioCtx.decodeAudioData(arr);
    } catch(e){ /* 載入失敗時該鼓件退回合成音 */ }
  })).then(() => setStatus("鼓音色就緒"));
  return kitLoading;
}

function playSample(name, when, gain, rate){
  const buf = kitBuffers[name];
  if (!buf) return false;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  if (rate) src.playbackRate.value = rate;
  const g = audioCtx.createGain();
  g.gain.value = gain;
  src.connect(g); g.connect(masterGain);
  src.start(when);
  scheduled.push(src);
  return true;
}

/* 金屬銅鈸合成:六方波泛音堆疊 + 帶通/高通,經典金屬音色法 */
function synthCymbal(when, decay, hpFreq, gain){
  const ratios = [2, 3, 4.16, 5.43, 6.79, 8.21];
  const bp = audioCtx.createBiquadFilter();
  bp.type = "bandpass"; bp.frequency.value = 10000;
  const hp = audioCtx.createBiquadFilter();
  hp.type = "highpass"; hp.frequency.value = hpFreq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + decay);
  bp.connect(hp); hp.connect(g); g.connect(masterGain);
  for (const r of ratios) {
    const o = audioCtx.createOscillator();
    o.type = "square"; o.frequency.value = 130.81 * r;
    o.connect(bp); o.start(when); o.stop(when + decay + 0.05);
    scheduled.push(o);
  }
}

function scheduleDrum(key, when){
  switch (key) {
    case 35: case 36: // Kick
      if (!playSample("kick", when, 1.0)) synthKick(when); break;
    case 38: case 40: // Snare
      if (!playSample("snare", when, 0.95)) synthSnare(when, 0.95); break;
    case 37:          // Side stick
      if (!playSample("snare", when, 0.4, 1.6)) synthSnare(when, 0.4); break;
    case 39:          // Clap → snare 替代
      playSample("snare", when, 0.8) || synthSnare(when, 0.8); break;
    case 42:          // Closed hi-hat
      if (!playSample("hihat", when, 0.75)) synthCymbal(when, 0.06, 8000, 0.25); break;
    case 44:          // Pedal hi-hat
      if (!playSample("hihat", when, 0.45, 1.1)) synthCymbal(when, 0.05, 8000, 0.16); break;
    case 46:          // Open hi-hat
      synthCymbal(when, 0.45, 7000, 0.28); break;
    case 41: case 43: // Floor toms
      if (!playSample("tom3", when, 0.95)) synthTom(when, 90); break;
    case 45: case 47: // Mid toms
      if (!playSample("tom2", when, 0.95)) synthTom(when, 130); break;
    case 48: case 50: // High toms
      if (!playSample("tom1", when, 0.95)) synthTom(when, 175); break;
    case 49: case 57: case 55: case 52: // Crash / splash / china
      synthCymbal(when, 1.6, 5500, 0.4); break;
    case 51: case 59: // Ride
      synthCymbal(when, 0.9, 9000, 0.2); break;
    case 53:          // Ride bell
      synthCymbal(when, 0.5, 10500, 0.3); break;
    default:
      playSample("snare", when, 0.7) || synthSnare(when, 0.7);
  }
}

/* 取樣載入失敗時的合成備援 */
function synthKick(when){
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(150, when);
  o.frequency.exponentialRampToValueAtTime(45, when + 0.12);
  g.gain.setValueAtTime(1.0, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
  o.connect(g); g.connect(masterGain);
  o.start(when); o.stop(when + 0.45); scheduled.push(o);
}
function synthSnare(when, vol){
  const len = audioCtx.sampleRate * 0.2;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const hp = audioCtx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1400;
  const g = audioCtx.createGain(); g.gain.value = vol;
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(when); scheduled.push(src);
  const o = audioCtx.createOscillator(), og = audioCtx.createGain();
  o.type="triangle"; o.frequency.value=185;
  og.gain.setValueAtTime(vol*0.5, when);
  og.gain.exponentialRampToValueAtTime(0.001, when+0.1);
  o.connect(og); og.connect(masterGain);
  o.start(when); o.stop(when+0.12); scheduled.push(o);
}
function synthTom(when, freq){
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(freq*1.5, when);
  o.frequency.exponentialRampToValueAtTime(freq, when + 0.08);
  g.gain.setValueAtTime(0.9, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
  o.connect(g); g.connect(masterGain);
  o.start(when); o.stop(when + 0.4); scheduled.push(o);
}

function currentSec(){ return audioCtx ? (audioCtx.currentTime - startCtxTime) : 0; }

function pausePlayback(){
  pausedAtSec = currentSec();
  stopAudioOnly();
  playing = false;
  $("playBtn").textContent = "▶ 播放";
  cancelAnimationFrame(rafId);
}

function stopAudioOnly(){
  for (const node of scheduled) { try { node.stop(); } catch(e){} }
  scheduled = [];
}

function stopPlayback(){
  stopAudioOnly();
  playing = false; pausedAtSec = 0;
  $("playBtn").textContent = "▶ 播放";
  cancelAnimationFrame(rafId);
  resetScroll();
  updateTimeLabel(0);
  $("progressfill").style.width = "0%";
  drawKeyboardLive(0);
}

/* ── 捲動同步 ─────────────────────────────── */
function playlineX(){ return $("stage").clientWidth * PLAYLINE_RATIO; }

function xAtSec(sec){
  const w = useCalib() ? calibSecToWhole(sec) : sec * bpm() / 240; // sec → whole
  if (!events.length) return 0;
  if (w <= events[0].tWhole) return events[0].x;
  const lastEv = events[events.length - 1];
  if (w >= lastEv.tWhole) {
    const f = (w - lastEv.tWhole) / Math.max(totalWhole - lastEv.tWhole, 1e-6);
    return lastEv.x + (endX - lastEv.x) * Math.min(Math.max(f, 0), 1);
  }
  // 二分搜尋找到 w 所在的區間,不管樂曲多長、播到哪裡,每次呼叫的運算量都差不多,
  // 不會像逐一掃描那樣越播到後面越慢(這是造成長曲子匯出到後段畫面卡住的真正原因)
  let lo = 0, hi = events.length - 2;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (events[mid].tWhole <= w) lo = mid; else hi = mid - 1;
  }
  const a = events[lo];
  const b = events[lo + 1] || { tWhole: totalWhole, x: endX };
  const f = (w - a.tWhole) / Math.max(b.tWhole - a.tWhole, 1e-6);
  return a.x + (b.x - a.x) * f;
}

function tick(){
  const sec = currentSec();
  if (sec >= totalSec()) { stopPlayback(); return; }
  const x = xAtSec(sec);
  $("scroller").style.transform = "translateX(" + (playlineX() - x) + "px)";
  $("progressfill").style.width = (sec / totalSec() * 100).toFixed(2) + "%";
  updateTimeLabel(sec);
  drawKeyboardLive(sec);
  rafId = requestAnimationFrame(tick);
}

function resetScroll(){
  if (!events.length) return;
  $("scroller").style.transform = "translateX(" + (playlineX() - events[0].x) + "px)";
}

function fmt(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function updateTimeLabel(sec){ $("timeLabel").textContent = fmt(sec) + " / " + fmt(totalSec()); }

/* ── 錄影模式 ─────────────────────────────── */
$("recBtn").addEventListener("click", () => {
  stopPlayback();
  document.body.classList.add("recording");
  resetScroll();
  // 倒數 3 秒後自動播放,留時間開啟 iOS 螢幕錄製
  let n = 3;
  const cd = $("countdown");
  cd.style.display = "flex"; cd.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      cd.style.display = "none";
      startPlayback(0);
    } else { cd.textContent = n; }
  }, 1000);
});
$("exitrec").addEventListener("click", () => {
  document.body.classList.remove("recording");
  stopPlayback();
});

/* ── 影片匯出 ─────────────────────────────── */
let exporting = false, exportCancelled = false;
const exportFps = 60; // 固定60fps,60沒有卡頓問題,不再提供選項

/* requestAnimationFrame 的實際頻率被螢幕更新率(通常60Hz)限制住,
   要求120/144fps時改用計時器強制排程,但實際能不能真的跑到那個速率還是要看裝置/瀏覽器支援 */
function scheduleFrame(fn, fps){
  if (fps <= 60) { requestAnimationFrame(fn); return; }
  setTimeout(fn, 1000 / fps);
}
let chosenAlign = "center";
let chosenIncludeKeyboard = false;

function showFmtStep(step){
  $("fmtStepType").style.display = step === "type" ? "flex" : "none";
  $("fmtStepAlign").style.display = step === "align" ? "flex" : "none";
  $("fmtStepFormat").style.display = step === "format" ? "flex" : "none";
}
$("exportBtn").addEventListener("click", () => {
  if (!events.length || exporting) return;
  showFmtStep("type");
  $("formatOverlay").classList.add("show");
});
$("fmtCancel").addEventListener("click", () => $("formatOverlay").classList.remove("show"));

$("fmtTypeScore").addEventListener("click", () => { chosenIncludeKeyboard = false; showFmtStep("align"); });
$("fmtTypeWithKeyboard").addEventListener("click", () => { chosenIncludeKeyboard = true; showFmtStep("align"); });

$("fmtBackFromAlign").addEventListener("click", () => showFmtStep("type"));
$("alignTop").addEventListener("click", () => { chosenAlign = "top"; showFmtStep("format"); });
$("alignCenter").addEventListener("click", () => { chosenAlign = "center"; showFmtStep("format"); });
$("alignBottom").addEventListener("click", () => { chosenAlign = "bottom"; showFmtStep("format"); });

$("fmtBackFromFormat").addEventListener("click", () => showFmtStep("align"));
$("fmtLandscape").addEventListener("click", () => {
  $("formatOverlay").classList.remove("show");
  exportVideo({ W: 1920, H: 1080, scoreH: 560, align: chosenAlign, bitrate: 5000000, fps: exportFps, includeKeyboard: chosenIncludeKeyboard });
});
$("fmtPortrait").addEventListener("click", () => {
  $("formatOverlay").classList.remove("show");
  exportVideo({ W: 1080, H: 1920, scoreH: 480, align: chosenAlign, bitrate: 5000000, fps: exportFps, includeKeyboard: chosenIncludeKeyboard });
});
$("exportCancel").addEventListener("click", () => { exportCancelled = true; });

function pickMime(){
  const cands = ["video/mp4;codecs=avc1","video/mp4","video/webm;codecs=vp9","video/webm"];
  for (const m of cands)
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  return "";
}

async function rasterizeScore(targetH){
  const svg = $("score").querySelector("svg");
  if (!svg) throw new Error("找不到樂譜");
  const srcW = parseFloat(svg.getAttribute("width"))  || svg.clientWidth;
  const srcH = parseFloat(svg.getAttribute("height")) || svg.clientHeight;
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const url = URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:"image/svg+xml"}));
  const img = new Image();
  await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error("樂譜點陣化失敗")); img.src=url; });
  const scale = targetH / srcH;
  const fullW = Math.ceil(srcW * scale);
  const TILE = 4000, tiles = [];
  for (let x = 0; x < fullW; x += TILE) {
    const w = Math.min(TILE, fullW - x);
    const c = document.createElement("canvas");
    c.width = w; c.height = targetH;
    c.getContext("2d").drawImage(img, -x, 0, fullW, targetH);
    tiles.push({ x, canvas: c });
  }
  URL.revokeObjectURL(url);
  return { tiles, scale };
}

async function exportCombinedWithVideo(){
  if (!events.length || exporting) return;
  const video = $("combineVideo");
  if (!video.src) { setStatus("請先在上面上傳彈奏影片"); return; }
  exporting = true; exportCancelled = false;
  await acquireWakeLock();
  stopPlayback();
  ensureAudio();
  $("combineStatus").textContent = "準備中…";
  let mediaStream = null;
  try {
    await new Promise((res, rej) => {
      if (video.readyState >= 1) return res();
      video.onloadedmetadata = res;
      video.onerror = () => rej(new Error("影片載入失敗"));
    });
    const W = video.videoWidth, H = video.videoHeight;
    if (!W || !H) throw new Error("讀不到影片尺寸");
    const scoreH = 260; // 依樂譜自然高度輸出,不再跟影片高度算百分比
    const kbH = 130;    // 鍵盤保留高度
    const plX = W * PLAYLINE_RATIO;
    const { tiles, scale } = await rasterizeScore(scoreH);

    const cv = document.createElement("canvas");
    cv.width = W; cv.height = scoreH + kbH;
    const ctx = cv.getContext("2d");
    const vStream = cv.captureStream(exportFps);

    // 直接從影片本身擷取真實音軌,不用我們的合成音色
    mediaStream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
    const audioTracks = mediaStream.getAudioTracks();
    const outStream = new MediaStream([...vStream.getVideoTracks(), ...audioTracks]);

    const mime = pickMime();
    const rec = new MediaRecorder(outStream, mime ? { mimeType: mime, videoBitsPerSecond: 4_000_000 } : undefined);
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const stopped = new Promise(res => rec.onstop = res);

    video.currentTime = 0;
    await video.play();
    rec.start(3000); // 每3秒分段一次:避免資料完全不釋放而累積過多記憶體,又不會像每秒切一次那麼頻繁

    // 影片畫面裁切:從影片垂直中央裁出跟樂譜同高的一段,維持原始比例不變形
    const srcY = Math.max(0, (H - scoreH) / 2);
    const calib = useCalib();

    await new Promise(resolve => {
      const draw = () => {
        if (exportCancelled || video.ended || video.paused) { resolve(); return; }
        const sec = video.currentTime;
        ctx.drawImage(video, 0, srcY, W, scoreH, 0, 0, W, scoreH);
        const off = plX - xAtSec(sec) * scale;
        for (const tl of tiles) {
          const dx = off + tl.x;
          if (dx < W && dx + tl.canvas.width > 0) ctx.drawImage(tl.canvas, dx, 0);
        }
        ctx.strokeStyle = "#B8860B"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(plX, scoreH*0.05); ctx.lineTo(plX, scoreH*0.95); ctx.stroke();
        const active = getActiveNotesAt(sec + KB_LOOKAHEAD_SEC, calib);
        drawKeyboard(ctx, 0, scoreH, W, kbH, active);
        $("combineStatus").textContent = fmt(sec) + " / " + fmt(video.duration);
        scheduleFrame(draw, exportFps);
      };
      draw();
    });

    rec.stop();
    video.pause();
    await stopped;
    const blob = new Blob(chunks, { type: mime || "video/webm" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "scrollscore-combined.webm"; a.click();
    $("combineStatus").textContent = "完成,已下載";
  } catch (err) {
    console.error(err);
    $("combineStatus").textContent = "合成失敗:" + (err.message || err);
  } finally {
    releaseWakeLock();
    exporting = false;
  }
}

/* 匯出過程主動要求螢幕保持喚醒,不要只靠文字提醒使用者自己注意 */
let wakeLockRef = null;
async function acquireWakeLock(){
  try {
    if ("wakeLock" in navigator) wakeLockRef = await navigator.wakeLock.request("screen");
  } catch (e) { console.error("wakeLock 要求失敗:", e); }
}
async function releaseWakeLock(){
  try { if (wakeLockRef) { await wakeLockRef.release(); wakeLockRef = null; } } catch (e) {}
}
document.addEventListener("visibilitychange", async () => {
  if (exporting && document.visibilityState === "visible" && !wakeLockRef) await acquireWakeLock();
});

async function exportVideo(cfg){
  if (!events.length || exporting) return;
  exporting = true; exportCancelled = false;
  await acquireWakeLock();
  stopPlayback();
  ensureAudio();
  if (kitLoading) await kitLoading;
  $("exportOverlay").classList.add("show");
  let aDest = null;
  try {
    const W = cfg.W, H = cfg.H, SCORE_H = cfg.scoreH;
    const kbH = cfg.includeKeyboard ? H * 0.12 : 0; // 鍵盤保留高度(沒選鍵盤就不留空間)
    const margin = H * 0.05;
    const topY = cfg.align === "top" ? margin
      : cfg.align === "bottom" ? (H - SCORE_H - margin - kbH)
      : (H - SCORE_H - kbH) / 2; // center(預設),有鍵盤時稍微往上挪讓出空間
    const plX = W * PLAYLINE_RATIO;
    const { tiles, scale } = await rasterizeScore(SCORE_H);

    const cv = document.createElement("canvas");
    cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");
    const vStream = cv.captureStream(cfg.fps || 30);
    aDest = audioCtx.createMediaStreamDestination();
    masterGain.connect(aDest);
    const stream = new MediaStream([
      ...vStream.getVideoTracks(),
      ...aDest.stream.getAudioTracks()
    ]);
    const mime = pickMime();
    const rec = new MediaRecorder(stream, mime ? { mimeType: mime, videoBitsPerSecond: cfg.bitrate } : undefined);
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const stopped = new Promise(res => rec.onstop = res);
    rec.start(3000); // 每3秒分段一次:避免資料完全不釋放而累積過多記憶體,又不會像每秒切一次那麼頻繁

    const LEAD = 0.4, TAIL = 0.6;
    const t0 = audioCtx.currentTime + 0.1;
    startCtxTime = t0 + LEAD;
    scheduled = [];
    const calib = useCalib();
    for (const ev of events) {
      const t = calib ? calibToSec(ev.tWhole) : wholeToSec(ev.tWhole);
      const chordAnchors = {};
      const harmonyEndSec = ev.harmonyEndWhole != null
        ? startCtxTime + (calib ? calibToSec(ev.harmonyEndWhole) : wholeToSec(ev.harmonyEndWhole))
        : null;
      for (const n of ev.notes) {
        const rollT = (n.rollIndex || 0) * computeArpEffectiveGap(ev, t, calib);
        const durSec = calib ? Math.max(calibToSec(ev.tWhole + n.durWhole) - t, 0.05) : wholeToSec(n.durWhole);
        if (n.drum) scheduleDrum(n.key, startCtxTime + t + rollT);
        else scheduleNote(n.freq, startCtxTime + t + rollT, durSec, ev.legato, ev.pedalOn, chordAnchors, harmonyEndSec, ev.artic);
      }
    }
    const total = totalSec();

    await new Promise(resolve => {
      const draw = () => {
        if (exportCancelled) { resolve(); return; }
        const el = audioCtx.currentTime - t0;
        const sec = Math.min(Math.max(el - LEAD, 0), total);
        ctx.fillStyle = "#FFFDF6";
        ctx.fillRect(0, 0, W, H);
        const off = plX - xAtSec(sec) * scale;
        for (const tl of tiles) {
          const dx = off + tl.x;
          if (dx < W && dx + tl.canvas.width > 0) ctx.drawImage(tl.canvas, dx, topY);
        }
        ctx.strokeStyle = "#B8860B"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(plX, H*0.08); ctx.lineTo(plX, H*0.92); ctx.stroke();
        ctx.fillStyle = "#B8860B";
        ctx.beginPath();
        ctx.moveTo(plX-9, H*0.08-2); ctx.lineTo(plX+9, H*0.08-2); ctx.lineTo(plX, H*0.08+13);
        ctx.closePath(); ctx.fill();
        if (cfg.includeKeyboard) {
          const active = getActiveNotesAt(sec + KB_LOOKAHEAD_SEC, calib);
          drawKeyboard(ctx, 0, H - kbH, W, kbH, active);
        }
        $("exportTime").textContent = fmt(sec) + " / " + fmt(total);
        $("exportFill").style.width = (sec/total*100).toFixed(1) + "%";
        if (el >= LEAD + total + TAIL) { resolve(); return; }
        scheduleFrame(draw, cfg.fps || 30);
      };
      draw();
    });

    stopAudioOnly();
    rec.stop();
    await stopped;
    if (!exportCancelled) {
      const blob = new Blob(chunks, { type: mime || "video/webm" });
      const ext = (mime && mime.indexOf("mp4") >= 0) ? "mp4" : "webm";
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "scrollscore-" + W + "x" + H + "." + ext;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href), 30000);
      setStatus("影片輸出完成(" + (blob.size/1048576).toFixed(1) + " MB)");
    } else {
      setStatus("已取消輸出");
    }
  } catch (err) {
    setStatus("輸出失敗:" + (err.message || err));
  }
  if (aDest) { try { masterGain.disconnect(aDest); } catch(e){} }
  stopAudioOnly();
  releaseWakeLock();
  $("exportOverlay").classList.remove("show");
  exporting = false;
}

window.addEventListener("resize", () => { if (!playing) resetScroll(); });
resizeKeyboardCanvas();
drawKeyboardLive(0);
</script>
</body>
