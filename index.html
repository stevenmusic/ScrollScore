<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScrollScore — 橫向捲動樂譜播放器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@2.0.0/build/opensheetmusicdisplay.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{
  --bg:#0C0A07;
  --panel:#161209;
  --gold:#C9A24B;
  --gold-bright:#EFD48A;
  --ivory:#F4ECDA;
  --muted:#8A7D5F;
  --line:#2A2415;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--ivory);
  font-family:"Noto Sans TC",sans-serif;
  display:flex;flex-direction:column;
}
/* ── 頂欄 ───────────────────────── */
header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--line);
  background:var(--panel);flex-wrap:wrap;
}
header h1{
  font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;
  letter-spacing:.12em;color:var(--gold);white-space:nowrap;
}
header h1 span{color:var(--ivory);font-weight:600}
.btn{
  border:1px solid var(--gold);background:transparent;color:var(--gold);
  font-family:inherit;font-size:14px;font-weight:500;
  padding:8px 16px;border-radius:999px;cursor:pointer;
  transition:background .2s,color .2s;
}
.btn:active{background:var(--gold);color:var(--bg)}
.btn.primary{background:var(--gold);color:var(--bg);font-weight:700}
.btn.primary:disabled{opacity:.35}
.btn:disabled{opacity:.35}
.spacer{flex:1}
.tempo-box{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.tempo-box b{color:var(--gold-bright);font-size:15px;min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
input[type=range]{
  -webkit-appearance:none;width:110px;height:3px;border-radius:2px;
  background:var(--line);outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--gold);border:2px solid var(--bg);
}
/* ── 樂譜視窗 ───────────────────── */
#stage{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;
  background:
    radial-gradient(ellipse 120% 80% at 50% 0%, #171208 0%, var(--bg) 60%);
}
#scoreBg{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:1}
#scroller{will-change:transform;padding:0 0 0 0;position:relative;z-index:2}
#score{filter:invert(92%) sepia(18%) saturate(180%) hue-rotate(10deg) brightness(1.02)}
/* OSMD 產出 SVG 為黑底白紙,用濾鏡翻成象牙色譜面 */
#playline{
  position:absolute;top:6%;bottom:6%;width:2px;
  left:var(--playx,25%);
  background:linear-gradient(to bottom,transparent,var(--gold-bright) 12%,var(--gold-bright) 88%,transparent);
  box-shadow:0 0 14px 2px rgba(233,203,122,.45);
  pointer-events:none;z-index:5;
}
#playline::before{
  content:"";position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top:10px solid var(--gold);
}
#empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;color:var(--muted);
  text-align:center;padding:24px;z-index:2;
}
#empty .mark{
  font-family:"Noto Serif TC",serif;font-size:52px;color:var(--gold);
  line-height:1;opacity:.85;
}
#empty p{font-size:14px;line-height:1.8;max-width:420px}
/* ── 底部狀態列 ─────────────────── */
footer{
  padding:8px 14px;border-top:1px solid var(--line);background:var(--panel);
  font-size:12px;color:var(--muted);display:flex;gap:12px;align-items:center;
}
#progressbar{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
#progressfill{height:100%;width:0%;background:var(--gold);transition:width .1s linear}
#status{white-space:nowrap;max-width:55%;overflow:hidden;text-overflow:ellipsis}
/* ── 錄影模式 ───────────────────── */
body.recording header, body.recording footer{display:none}
body.recording #stage{background:#FFFDF6}
body.recording #score{filter:none}
body.recording #playline{
  background:linear-gradient(to bottom,transparent,#B8860B 12%,#B8860B 88%,transparent);
  box-shadow:0 0 10px 1px rgba(184,134,11,.35);
}
body.recording #playline::before{border-top-color:#B8860B}
#countdown{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-size:120px;font-weight:700;color:var(--gold);
  background:rgba(12,10,7,.55);z-index:20;
}
body.recording #countdown{color:#B8860B;background:rgba(255,253,246,.7)}
#exitrec{
  position:absolute;top:10px;right:10px;z-index:30;display:none;
  width:36px;height:36px;border-radius:50%;border:1px solid #B8860B;
  color:#B8860B;background:rgba(255,253,246,.8);font-size:18px;line-height:1;
}
body.recording #exitrec{display:block}
input[type=file]{display:none}
/* ── 匯出覆蓋層 ─────────────────── */
#exportOverlay{
  position:absolute;inset:0;z-index:40;display:none;
  align-items:center;justify-content:center;
  background:rgba(12,10,7,.88);backdrop-filter:blur(3px);
}
#exportOverlay.show{display:flex}
#exportOverlay .box{
  text-align:center;padding:28px 32px;border:1px solid var(--gold);
  border-radius:14px;background:var(--panel);max-width:320px;
}
#exportOverlay .title{
  font-family:"Noto Serif TC",serif;font-size:20px;color:var(--gold);
  letter-spacing:.1em;margin-bottom:10px;
}
#exportTime{font-size:26px;color:var(--gold-bright);font-variant-numeric:tabular-nums;margin-bottom:10px}
#exportBar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:14px}
#exportFill{height:100%;width:0%;background:var(--gold)}
#exportOverlay p{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:16px}
/* ── 格式選擇 ───────────────────── */
#formatOverlay{
  position:absolute;inset:0;z-index:45;display:none;
  align-items:center;justify-content:center;
  background:rgba(12,10,7,.88);backdrop-filter:blur(3px);
}
#formatOverlay.show{display:flex}
#formatOverlay .box{
  text-align:center;padding:26px 28px;border:1px solid var(--gold);
  border-radius:14px;background:var(--panel);width:min(300px, 86vw);
  max-height:86vh;overflow-y:auto;box-sizing:border-box;
}
.fmt-step{display:flex;flex-direction:column;align-items:stretch}
#formatOverlay .title{
  font-family:"Noto Serif TC",serif;font-size:19px;color:var(--gold);
  letter-spacing:.1em;margin-bottom:18px;
}
.fmt{
  display:flex;align-items:center;gap:14px;width:100%;
  padding:13px 16px;margin-bottom:12px;border-radius:12px;
  border:1px solid var(--line);background:var(--bg);color:var(--ivory);
  font-family:inherit;font-size:14px;text-align:left;cursor:pointer;
  transition:border-color .2s;
}
.fmt:active{border-color:var(--gold)}
.fmt b{color:var(--gold-bright);font-size:15px}
.fmt small{color:var(--muted);font-size:12px}
.ratio{border:1.5px solid var(--gold);border-radius:3px;flex:none}
.ratio-l{width:34px;height:19px}
.ratio-p{width:19px;height:34px;margin:0 7.5px}
</style>
</head>
<body>

<header>
  <h1>Scroll<span>Score</span></h1>
  <button class="btn" id="loadBtn">載入樂譜</button>
  <button class="btn primary" id="playBtn" disabled>▶ 播放</button>
  <button class="btn" id="stopBtn" disabled>■ 停止</button>
  <div class="spacer"></div>
  <div class="tempo-box">速度 <input type="range" id="tempo" min="40" max="400" value="100"><b id="tempoVal">100</b></div>
  <button class="btn" id="settingsToggle" style="display:flex;align-items:center;gap:6px">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </button>
  <input type="file" id="fileInput" accept=".xml,.musicxml,.mxl">
</header>

<div id="settingsPanel" style="padding:10px 14px;border-bottom:1px solid var(--line);background:var(--panel);display:none;flex-wrap:wrap;gap:10px;align-items:center">
  <div class="tempo-box">移調 <button class="btn" id="transDown" style="padding:4px 10px" disabled>−</button><b id="transVal">原調</b><button class="btn" id="transUp" style="padding:4px 10px" disabled>＋</button></div>
  <div class="tempo-box">樂器
    <select id="instrument" style="background:var(--bg);color:var(--ivory);border:1px solid var(--gold);border-radius:8px;padding:5px 8px;font-family:inherit;font-size:13px;text-align:center;text-align-last:center">
      <option value="piano">鋼琴</option>
      <option value="strings">小提琴</option>
      <option value="cello">大提琴</option>
      <option value="flute">長笛</option>
      <option value="guitar">木吉他(民謠)</option>
      <option value="guitarnylon">古典吉他(尼龍弦)</option>
      <option value="clarinet">單簧管</option>
    </select>
  </div>

  <div class="tempo-box"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="legatoPedal" checked style="width:16px;height:16px">圓滑/踏板效果</label></div>
  <div class="tempo-box">背景透明度 <input type="range" id="scoreBgOpacity" min="0" max="100" value="0"><b id="scoreBgOpacityVal">0</b></div>
  <div class="tempo-box"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="showTempoMarks" style="width:16px;height:16px">顯示速度記號</label></div>
  <button class="btn" id="recBtn" disabled>錄影模式</button>
  <button class="btn" id="exportBtn" disabled>⬇ 匯出影片</button>
</div>

<div style="display:none">
  <button id="calibFileBtn"></button>
  <input type="file" id="calibFile" accept="audio/*,video/*">
  <audio id="calibAudio"></audio>
  <button id="calibStartBtn"></button>
  <button id="calibTapBtn"></button>
  <button id="calibUndoBtn"></button>
  <button id="calibFinishBtn"></button>
  <input type="number" id="calibRetapIndex" value="0">
  <button id="calibRetapBtn"></button>
  <input type="checkbox" id="useCalibration">
  <span id="calibStatus"></span>
  <video id="combineVideo"></video>
  <span id="combineStatus"></span>
</div>

<div id="stage">
  <div id="scoreBg"></div>
  <div id="empty">
    <div class="mark">𝄞</div>
    <p>從 Sibelius 匯出 MusicXML(.musicxml / .xml / .mxl),<br>
    點「載入樂譜」即可生成單行橫向捲動樂譜。<br>
    播放時樂譜會流過固定的金色播放線,音符同步發聲。</p>
  </div>
  <div id="scroller"><div id="score"></div></div>
  <div id="playline"></div>
  <div id="countdown">3</div>
  <button id="exitrec" title="離開錄影模式">✕</button>
  <div id="formatOverlay">
    <div class="box">
      <div class="title" id="fmtTitle">選擇匯出類型</div>
      <div id="fmtStepType" class="fmt-step">
        <button class="fmt" id="fmtTypeScore">
          <span><b>純樂譜</b><br><small>滿版1920×1080 或 1080×1920</small></span>
        </button>
        <button class="fmt" id="fmtTypeWithKeyboard">
          <span><b>樂譜+鍵盤</b><br><small>畫面下方加上鋼琴鍵盤高亮顯示</small></span>
        </button>
        <button class="btn" id="fmtCancel">取消</button>
      </div>
      <div id="fmtStepAlign" class="fmt-step" style="display:none">
        <button class="fmt" id="alignTop"><span><b>樂譜靠上</b></span></button>
        <button class="fmt" id="alignCenter"><span><b>樂譜靠中</b></span></button>
        <button class="fmt" id="alignBottom"><span><b>樂譜靠下</b></span></button>
        <button class="btn" id="fmtBackFromAlign">返回</button>
      </div>
      <div id="fmtStepFormat" class="fmt-step" style="display:none">
        <button class="fmt" id="fmtLandscape">
          <span class="ratio ratio-l"></span>
          <span><b>橫式 1920 × 1080</b><br><small>YouTube 影片</small></span>
        </button>
        <button class="fmt" id="fmtPortrait">
          <span class="ratio ratio-p"></span>
          <span><b>直式 1080 × 1920</b><br><small>Shorts / Reels / TikTok</small></span>
        </button>
        <button class="btn" id="fmtBackFromFormat">返回</button>

  </div>
  <div id="exportOverlay">
    <div class="box">
      <div class="title">影片輸出中</div>

      <p>請保持此頁面在前景、螢幕不要熄滅。<br>輸出時間 = 樂曲長度,完成後自動下載。</p>
      <button class="btn" id="exportCancel">取消</button>
    </div>
  </div>
</div>
<canvas id="keyboardCanvas" style="display:block;width:100%;height:90px;background:#0C0A07"></canvas>

<footer>
  <span id="status">尚未載入樂譜</span>
  <div id="progressbar"><div id="progressfill"></div></div>
  <span id="timeLabel">0:00 / 0:00</span>
</footer>

<script>
"use strict";
const $ = id => document.getElementById(id);
const statusEl = $("status");
function setStatus(msg){ statusEl.textContent = msg; }

let osmd = null;
let events = [];        // {tWhole, x, notes:[{freq,durWhole}], legato, pedalOn}
let slurRanges = [], pedalRanges = [], repeatChordRanges = [];
let articMap = {};
let articEntries = [], arpEntries = [];
const MARK_MATCH_EPSILON = 0.01; // 全音符單位,容許兩套游標系統之間的小飄移
function buildSortedEntries(map){
  return Object.keys(map).map(k => ({ t: parseFloat(k), v: map[k] })).sort((a, b) => a.t - b.t);
}
function findNearestEntry(entries, t, epsilon){
  if (!entries.length) return undefined;
  let lo = 0, hi = entries.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (entries[mid].t < t) lo = mid + 1; else hi = mid;
  }
  let bestIdx = lo;
  if (lo > 0 && Math.abs(entries[lo - 1].t - t) < Math.abs(entries[lo].t - t)) bestIdx = lo - 1;
  if (Math.abs(entries[bestIdx].t - t) <= epsilon) return entries[bestIdx].v;
  return undefined;
}
let noteStaffByMidi = {};
let arpMap = {};
let calibrating = false, calibStartPerf = 0, calibTapIndex = 0;
let calibrationMap = []; // [{tWhole, realSec}] 已排序,由 tap-along 或自動偵測建立
let endX = 0, totalWhole = 0;
let audioCtx = null, masterGain = null;
let playing = false, startCtxTime = 0, pausedAtSec = 0;
let rafId = 0;
let scheduled = [];     // 已排程的 audio nodes,停止時關閉
let lastXmlText = null;
let transposeSemitones = 0;
const PLAYLINE_RATIO = 0.25;
/* 琶音滾奏間隔:跟著目前速度等比例調整(太慢的歌固定間隔會顯得脫節,太快的歌固定間隔會佔掉太多拍子),
   但設上下限避免極端速度時滾奏變得不自然 */
function arpGapSec(){
  const quarterSec = 60 / bpm(); // 一拍(四分音符)的實際秒數
  return Math.min(0.06, Math.max(0.02, quarterSec * 0.12));
}

/* 確保琶音展開的範圍絕對不會超過前一個/後一個音符的位置,不夠空間就自動壓縮間隔 */
const ARP_SAFETY_SEC = 0.012; // 留一點點餘裕,避免剛好貼齊
function computeArpEffectiveGap(ev, t0, calib){
  const baseGap = arpGapSec();
  if (!ev.arpCount || ev.arpCount < 2) return baseGap;
  const span = ev.arpCount - 1; // 全部音符都壓在拍點之前,最早的音符在拍點前 span 個間隔
  if (span <= 0) return baseGap;
  const prevSec = ev.arpGapBeforeWhole != null
    ? (calib ? calibToSec(ev.tWhole - ev.arpGapBeforeWhole) : wholeToSec(ev.tWhole - ev.arpGapBeforeWhole))
    : -Infinity;
  const maxBefore = t0 - prevSec - ARP_SAFETY_SEC;
  const maxGapAllowed = maxBefore / span;
  return Math.max(0, Math.min(baseGap, maxGapAllowed));
}

/* ── 載入檔案 ──────────────────────────────── */
$("loadBtn").addEventListener("click", () => $("fileInput").click());

$("settingsToggle").addEventListener("click", () => {
  const p = $("settingsPanel");
  p.style.display = (p.style.display === "none") ? "flex" : "none";
});
$("fileInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  stopPlayback();
  setStatus("解析中:" + file.name);
  try {
    let xmlText;
    if (/\.mxl$/i.test(file.name)) {
      xmlText = await extractMXL(file);
    } else {
      xmlText = await file.text();
    }
    transposeSemitones = 0;
    updateTransposeLabel();
    const parsed = parseXmlTimeline(xmlText);
    slurRanges = parsed.slurRanges;
    pedalRanges = parsed.pedalRanges;
    repeatChordRanges = parsed.repeatRanges;
    articMap = parsed.articMap;
    noteStaffByMidi = parsed.noteStaffByMidi;
    for (const midiKey in noteStaffByMidi) noteStaffByMidi[midiKey].sort((a, b) => a.t - b.t);
    arpMap = parsed.arpMap;
    articEntries = buildSortedEntries(articMap);
    arpEntries = buildSortedEntries(arpMap);
    let tempoNote = "";
    if (parsed.soundTempo && parsed.soundTempo > 0) {
      const t = Math.round(Math.min(400, Math.max(40, parsed.soundTempo)));
      $("tempo").value = t;
      $("tempoVal").textContent = t;
      if (parsed.timeSig && parsed.timeSig.isCompound) {
        const dottedQuarterEquiv = (t / 1.5).toFixed(1);
        tempoNote = "(偵測到" + parsed.timeSig.beats + "/" + parsed.timeSig.beatType + "複拍子,已自動套用樂譜內建速度" + t + ",相當於附點四分音符=" + dottedQuarterEquiv + ")";
      } else {
        tempoNote = "(已自動套用樂譜內建速度" + t + ")";
      }
    }
    await renderScore(xmlText);
    lastXmlText = xmlText;
    setStatus("已載入:" + file.name + "(" + events.length + " 個節點," + repeatChordRanges.length + " 組重複音型)" + tempoNote);
    loadInstrumentSamples(currentInstrument());
  } catch (err) {
    setStatus("載入失敗:" + (err.message || err));
  }
  e.target.value = "";
});

async function extractMXL(file){
  const zip = await JSZip.loadAsync(file);
  // 先讀 container.xml 找 rootfile
  let rootPath = null;
  const container = zip.file("META-INF/container.xml");
  if (container) {
    const cx = await container.async("text");
    const m = cx.match(/full-path="([^"]+)"/);
    if (m) rootPath = m[1];
  }
  if (!rootPath) {
    rootPath = Object.keys(zip.files).find(p => /\.(xml|musicxml)$/i.test(p) && !p.startsWith("META-INF"));
  }
  if (!rootPath) throw new Error("MXL 內找不到 MusicXML");
  return zip.file(rootPath).async("text");
}

/* ── 移調:直接改寫 MusicXML 的音高/調號資料,依照樂理正確選擇升記號或降記號 ── */
const LETTER_BASE = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
const LETTERS = ["C","D","E","F","G","A","B"];
const SHARP_ORDER = ["F","C","G","D","A","E","B"]; // 升記號依序出現的順序(F#,C#,G#...)
const FLAT_ORDER  = ["B","E","A","D","G","C","F"]; // 降記號依序出現的順序(Bb,Eb,Ab...)

function transposeMusicXML(xmlText, semitones){
  if (!semitones) return xmlText;
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");

  // 讀取原調(用第一個 key/fifths,找不到就當C大調/A小調)
  let origFifths = 0;
  const keyEls = doc.getElementsByTagName("key");
  if (keyEls.length) {
    const f = keyEls[0].getElementsByTagName("fifths")[0];
    if (f) origFifths = parseInt(f.textContent, 10) || 0;
  }

  // 半音移調 -> 五度圈位移量(標準換算:每個半音對應到五度圈上的固定位置,7為五度的半音數,取最接近0的等音選擇)
  const rawShift = (((7 * semitones) % 12) + 12) % 12;
  const fifthsShift = rawShift > 6 ? rawShift - 12 : rawShift;
  let newFifths = origFifths + fifthsShift;
  while (newFifths > 7) newFifths -= 12;  // 等音代換,避免超過7個升降記號的極端調
  while (newFifths < -7) newFifths += 12;

  // 音程移調(generic interval):連同音名字母一起移調,而不是移調後在新調裡重找拼法。
  // 這樣「這個音相對自己音名字母是升還是降」的關係會被保留下來——
  // 例如和聲小調升高的導音(F升高成F#),移調後還是「升高」的狀態,
  // 不會因為新調是降記號調就被誤判成該用降記號拼寫。
  const letterShift = (((fifthsShift * 4) % 7) + 7) % 7;

  // 重新拼寫每一個音符
  for (const p of Array.from(doc.getElementsByTagName("pitch"))) {
    const stepEl = p.getElementsByTagName("step")[0];
    const octaveEl = p.getElementsByTagName("octave")[0];
    if (!stepEl || !octaveEl) continue;
    const alterEl = p.getElementsByTagName("alter")[0];
    const origStep = stepEl.textContent.trim();
    const origOctave = parseInt(octaveEl.textContent, 10);
    const origAlter = alterEl ? parseFloat(alterEl.textContent) : 0;
    const origLetterIdx = LETTERS.indexOf(origStep);
    if (origLetterIdx < 0 || isNaN(origOctave)) continue;

    const origMidi = (origOctave + 1) * 12 + LETTER_BASE[origStep] + origAlter;
    const targetMidi = origMidi + semitones;

    const totalLetterSteps = origLetterIdx + letterShift;
    const newLetterIdx = totalLetterSteps % 7;
    const letterOctaveCarry = Math.floor(totalLetterSteps / 7);
    const newLetter = LETTERS[newLetterIdx];
    const octaveBase = Math.floor(semitones / 12); // 整個八度的位移量,跟字母進位是兩件事,要分開算
    const newOctaveGuess = origOctave + letterOctaveCarry + octaveBase;
    const naturalNewMidi = (newOctaveGuess + 1) * 12 + LETTER_BASE[newLetter];
    let newAlter = targetMidi - naturalNewMidi;
    let newOctave = newOctaveGuess;
    // 正常情況下 newAlter 應該落在小範圍內(單升降或重升降);
    // 萬一超出合理範圍,代表八度算錯了,用八度校正(理論上不會發生,保險而已)
    while (newAlter > 6) { newAlter -= 12; newOctave += 1; }
    while (newAlter < -6) { newAlter += 12; newOctave -= 1; }

    stepEl.textContent = newLetter;
    octaveEl.textContent = String(newOctave);
    if (newAlter === 0) {
      if (alterEl) alterEl.parentNode.removeChild(alterEl);
    } else if (alterEl) {
      alterEl.textContent = String(newAlter);
    } else {
      const newAlterEl = doc.createElement("alter");
      newAlterEl.textContent = String(newAlter);
      p.insertBefore(newAlterEl, stepEl.nextSibling);
    }
  }
  // 更新調號標記
  for (const k of Array.from(keyEls)) {
    const f = k.getElementsByTagName("fifths")[0];
    if (f) f.textContent = String(newFifths);
  }
  return new XMLSerializer().serializeToString(doc);
}

/* ── 渲染 + 建立時間軸 ─────────────────────── */
async function renderScore(xmlText){
  $("empty").style.display = "none";
  const scoreDiv = $("score");
  scoreDiv.innerHTML = "";
  osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(scoreDiv, {
    backend: "svg",
    autoResize: false,
    drawTitle: false, drawSubtitle: false, drawComposer: false, drawLyricist: false,
    drawPartNames: false,
    drawMeasureNumbers: true,
    drawMetronomeMarks: $("showTempoMarks").checked,
    followCursor: false
  });
  osmd.EngravingRules.RenderSingleHorizontalStaffline = true;
  osmd.EngravingRules.PageTopMargin = 1;
  osmd.EngravingRules.PageBottomMargin = 1;

  const finalXml = transposeSemitones ? transposeMusicXML(xmlText, transposeSemitones) : xmlText;
  await osmd.load(finalXml);
  osmd.zoom = 0.9;
  osmd.render();

  buildTimeline();
  rebuildKeyboardRange();
  if (events.some(ev => ev.notes.some(n => n.drum))) loadDrumKit();
  resetScroll();
  $("playBtn").disabled = false;
  $("stopBtn").disabled = false;
  $("recBtn").disabled = false;
  $("exportBtn").disabled = false;
  $("transUp").disabled = false;
  $("transDown").disabled = false;
  $("calibStartBtn").disabled = false;
  updateTimeLabel(0);
}

/* ── 從原始 MusicXML 讀取踏板記號與圓滑線範圍 ── */
function parseXmlTimeline(xmlText){
  try {
    const doc = new DOMParser().parseFromString(xmlText, "text/xml");
    const parts = Array.from(doc.getElementsByTagName("part"));
    let bestPart = null, bestCount = -1;
    for (const p of parts) {
      const c = p.getElementsByTagName("note").length;
      if (c > bestCount) { bestCount = c; bestPart = p; }
    }
    // 讀取樂譜本身內建的速度資訊(MusicXML規範規定這個數字永遠是換算成四分音符為單位,
    // 不管拍號是不是複拍子、不管顯示的是不是附點四分音符,都不用我們自己再做換算)
    let soundTempo = null;
    const soundEl = doc.getElementsByTagName("sound");
    for (const s of Array.from(soundEl)) {
      const t = s.getAttribute("tempo");
      if (t) { soundTempo = parseFloat(t); break; }
    }
    // 讀取拍號,判斷是不是複拍子(3/8,6/8,9/8,12/8這種),純粹給使用者參考用的資訊顯示
    let timeSig = null;
    const timeEl = doc.getElementsByTagName("time")[0];
    if (timeEl) {
      const beatsEl = timeEl.getElementsByTagName("beats")[0];
      const beatTypeEl = timeEl.getElementsByTagName("beat-type")[0];
      if (beatsEl && beatTypeEl) {
        const beats = parseInt(beatsEl.textContent, 10);
        const beatType = parseInt(beatTypeEl.textContent, 10);
        const isCompound = beatType === 8 && beats % 3 === 0 && beats > 0;
        timeSig = { beats, beatType, isCompound };
      }
    }
    if (!bestPart) return { slurRanges: [], pedalRanges: [], repeatRanges: [], articMap: {}, noteStaffByMidi: {}, arpMap: {}, soundTempo, timeSig };

    let divisions = 1, cursor = 0, lastStaff = 1;
    const slurStarts = {};
    const outSlurs = [];
    const pedalStack = [];
    const outPedals = [];
    const staffOnsets = {}; // staffNum -> [{tWhole, durWhole, pcs:Set}], 給重複音型偵測用
    const noteStaffByMidi = {}; // midi -> [{t:tWhole, v:staffNum}], 用容錯比對找左右手歸屬,避免飄移誤判
    const articMap = {}; // tWhole(定點字串) -> {accent,strongAccent,staccato,staccatissimo,tenuto,detachedLegato,spiccato,softAccent,fermata}
    const arpMap = {}; // tWhole(定點字串) -> "up"/"down",分解和弦(琶音)標記

    function midiFromNote(noteEl){
      const pitchEl = noteEl.getElementsByTagName("pitch")[0];
      if (!pitchEl) return null;
      const stepEl = pitchEl.getElementsByTagName("step")[0];
      const octaveEl = pitchEl.getElementsByTagName("octave")[0];
      if (!stepEl || !octaveEl) return null;
      const stepMap = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
      let base = stepMap[stepEl.textContent.trim()];
      if (base === undefined) return null;
      const alterEl = pitchEl.getElementsByTagName("alter")[0];
      if (alterEl) base += parseFloat(alterEl.textContent);
      const oct = parseInt(octaveEl.textContent, 10);
      return (oct + 1) * 12 + base;
    }

    function pitchClassFromNote(noteEl){
      const pitchEl = noteEl.getElementsByTagName("pitch")[0];
      if (!pitchEl) return null;
      const stepEl = pitchEl.getElementsByTagName("step")[0];
      if (!stepEl) return null;
      const stepMap = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
      let pc = stepMap[stepEl.textContent.trim()];
      if (pc === undefined) return null;
      const alterEl = pitchEl.getElementsByTagName("alter")[0];
      if (alterEl) pc += parseFloat(alterEl.textContent);
      return ((Math.round(pc) % 12) + 12) % 12;
    }

    for (const measure of Array.from(bestPart.getElementsByTagName("measure"))) {
      for (const child of Array.from(measure.children)) {
        if (child.tagName === "attributes") {
          const d = child.getElementsByTagName("divisions")[0];
          if (d) divisions = parseFloat(d.textContent) || divisions;
        } else if (child.tagName === "direction") {
          const pedalEl = child.getElementsByTagName("pedal")[0];
          if (pedalEl) {
            const type = pedalEl.getAttribute("type");
            if (type === "start" || type === "resume") {
              pedalStack.push(cursor);
            } else if ((type === "stop" || type === "change") && pedalStack.length) {
              const start = pedalStack.pop();
              outPedals.push({ start, end: cursor });
              if (type === "change") pedalStack.push(cursor);
            }
          }
        } else if (child.tagName === "backup") {
          const d = child.getElementsByTagName("duration")[0];
          if (d) cursor -= (parseFloat(d.textContent) / divisions) / 4;
        } else if (child.tagName === "forward") {
          const d = child.getElementsByTagName("duration")[0];
          if (d) cursor += (parseFloat(d.textContent) / divisions) / 4;
        } else if (child.tagName === "note") {
          const isChord = !!child.getElementsByTagName("chord")[0];
          const isGrace = !!child.getElementsByTagName("grace")[0];
          const durEl = child.getElementsByTagName("duration")[0];
          const durWhole = durEl ? (parseFloat(durEl.textContent) / divisions) / 4 : 0;
          // 譜表(左右手)判斷提前到這裡,琶音標記要用到,分辨同一時間點左右手彈相同音高但只有一手標記的情況
          const staffElEarly = child.getElementsByTagName("staff")[0];
          const staffNumEarly = staffElEarly ? parseInt(staffElEarly.textContent, 10) : lastStaff;
          lastStaff = staffNumEarly;
          const notations = child.getElementsByTagName("notations")[0];
          if (notations) {
            for (const s of Array.from(notations.getElementsByTagName("slur"))) {
              const num = s.getAttribute("number") || "1";
              const type = s.getAttribute("type");
              if (type === "start") slurStarts[num] = cursor;
              else if (type === "stop" && slurStarts[num] !== undefined) {
                outSlurs.push({ start: slurStarts[num], end: cursor + durWhole });
                delete slurStarts[num];
              }
            }
            // 演奏記號(articulation):重音、斷奏、保持音等,直接讀樂譜上明確標示的記號
            const artEl = notations.getElementsByTagName("articulations")[0];
            const flags = {};
            if (artEl) {
              if (artEl.getElementsByTagName("accent")[0]) flags.accent = true;
              if (artEl.getElementsByTagName("strong-accent")[0]) flags.strongAccent = true;
              if (artEl.getElementsByTagName("staccato")[0]) flags.staccato = true;
              if (artEl.getElementsByTagName("staccatissimo")[0]) flags.staccatissimo = true;
              if (artEl.getElementsByTagName("tenuto")[0]) flags.tenuto = true;
              if (artEl.getElementsByTagName("detached-legato")[0]) flags.detachedLegato = true;
              if (artEl.getElementsByTagName("spiccato")[0]) flags.spiccato = true;
              if (artEl.getElementsByTagName("soft-accent")[0]) flags.softAccent = true;
            }
            if (notations.getElementsByTagName("fermata")[0]) flags.fermata = true;
            if (Object.keys(flags).length) {
              const key = cursor.toFixed(6);
              const existing = articMap[key] || {};
              articMap[key] = Object.assign(existing, flags);
            }
            // 分解和弦(琶音)記號:MusicXML是逐音符標記的,同一個和絃裡可能只有部分音符要滾奏,
            // 其他音符(例如同時按住的持續音)不標記、應該正常發聲,所以要記錄「哪些確切音高」有標記,
            // 不能只記錄「這個時間點有琶音」就把整組音全部滾奏
            const arpEl = notations.getElementsByTagName("arpeggiate")[0];
            if (arpEl) {
              const noteMidiForArp = midiFromNote(child);
              if (noteMidiForArp !== null) {
                const key = cursor.toFixed(6);
                const groupNum = arpEl.getAttribute("number") || "1";
                if (!arpMap[key]) arpMap[key] = { groups: {} };
                if (!arpMap[key].groups[groupNum]) {
                  arpMap[key].groups[groupNum] = { direction: arpEl.getAttribute("direction") || "up", notes: new Set() };
                }
                arpMap[key].groups[groupNum].notes.add(Math.round(noteMidiForArp) + "_" + staffNumEarly);
              }
            }
          }
          // 記錄這個音符所屬的譜表(左右手),用來做重複音型偵測跟鍵盤上色
          const staffNum = staffNumEarly;
          const noteMidi = midiFromNote(child);
          if (noteMidi !== null) {
            if (!noteStaffByMidi[noteMidi]) noteStaffByMidi[noteMidi] = [];
            noteStaffByMidi[noteMidi].push({ t: cursor, v: staffNum });
          }
          const pc = pitchClassFromNote(child);
          if (pc !== null) {
            if (!staffOnsets[staffNum]) staffOnsets[staffNum] = [];
            const list = staffOnsets[staffNum];
            if (isChord && list.length) {
              const last = list[list.length - 1];
              last.pcs.add(pc);
              last.durWhole = Math.max(last.durWhole, durWhole);
            } else if (!isGrace) {
              list.push({ tWhole: cursor, durWhole, pcs: new Set([pc]) });
            }
          }
          if (!isChord && !isGrace) cursor += durWhole;
        }
      }
    }
    let repeatRanges = [];
    for (const staffNum of Object.keys(staffOnsets)) {
      repeatRanges = repeatRanges.concat(detectRepeatingChordRanges(staffOnsets[staffNum]));
    }
    return { slurRanges: outSlurs, pedalRanges: outPedals, repeatRanges, articMap, noteStaffByMidi, arpMap, soundTempo, timeSig };
  } catch (e) {
    console.error("讀取踏板/圓滑線資訊失敗:", e);
    return { slurRanges: [], pedalRanges: [], repeatRanges: [], articMap: {}, noteStaffByMidi: {}, arpMap: {}, soundTempo: null, timeSig: null };
  }
}
/* 偵測某一手(譜表)裡,音符是否精確循環重複(例如分解和弦C-E-G-C-E-G...),
   偵測到就把整個重複範圍當一個和聲區塊,讓其他聲部的音符可以延長撐滿 */

// 依大小分組,比對時只需要比對同大小的公式,加快速度
const CHORD_BY_SIZE = {};
for (const f of CHORD_FORMULAS) {
  (CHORD_BY_SIZE[f.iv.length] = CHORD_BY_SIZE[f.iv.length] || []).push(f.iv.join(","));
}
/* 判斷一組音高集合(不分八度、不分排列順序,含轉位)是否符合任何已知和絃結構 */
function isRecognizedChord(pcSet){
  const pcs = Array.from(pcSet);
  if (pcs.length < 2) return true; // 單一個音還不足以判斷,先當作可以延伸,等累積更多再驗證
  const formulas = CHORD_BY_SIZE[pcs.length];
  if (!formulas) return false;
  for (const root of pcs) {
    const intervals = pcs.map(pc => ((pc - root) % 12 + 12) % 12).sort((a,b)=>a-b).join(",");
    if (formulas.includes(intervals)) return true;
  }
  return false;
}

function detectRepeatingChordRanges(onsets, maxChordSize){
  maxChordSize = maxChordSize || 7; // 最多到十三和絃(常省略音,約6~7個不同音)
  const MIN_NOTES = 3; // 至少要有三和絃份量的音符,實際是否為和絃交給樂理驗證把關
  const ranges = [];
  const n = onsets.length;
  let i = 0;
  while (i < n) {
    let set = new Set(onsets[i].pcs);
    let j = i + 1;
    let lastValidJ = isRecognizedChord(set) ? i : -1;
    while (j < n) {
      const union = new Set(set);
      for (const pc of onsets[j].pcs) union.add(pc);
      if (union.size > maxChordSize) break; // 音種類數超過十三和絃範圍,不可能是同一個和絃
      set = union;
      j++;
      if (isRecognizedChord(set)) lastValidJ = j - 1; // 記錄目前為止,最後一次符合已知和絃結構的位置
    }
    if (lastValidJ >= i && (lastValidJ - i + 1) >= MIN_NOTES) {
      ranges.push({ start: onsets[i].tWhole, end: onsets[lastValidJ].tWhole + onsets[lastValidJ].durWhole });
      i = lastValidJ + 1;
    } else {
      i++;
    }
  }
  return ranges;
}
function inRanges(t, ranges){
  for (const r of ranges) if (t >= r.start && t < r.end) return true;
  return false;
}

function buildTimeline(){
  events = [];
  const cursor = osmd.cursor;
  cursor.show();
  cursor.reset();
  const it = cursor.Iterator;
  let lastX = 0;
  while (!it.EndReached) {
    const tWhole = it.currentTimeStamp.RealValue;   // 以全音符為單位
    const el = cursor.cursorElement;
    const x = el ? (el.offsetLeft + el.offsetWidth / 2) : lastX;
    lastX = x;
    const notes = [];
    const ves = it.CurrentVoiceEntries || [];
    for (const ve of ves) {
      for (const n of ve.Notes) {
        if (!n.Pitch) continue;                      // 休止符
        if (n.NoteTie && n.NoteTie.StartNote !== n) continue; // 連結線後段不重發聲
        let durWhole = n.Length.RealValue;
        if (n.NoteTie && n.NoteTie.StartNote === n) {
          durWhole = n.NoteTie.Notes.reduce((s,t)=>s+t.Length.RealValue,0);
        }
        const drumKey = getDrumKey(n);
        if (drumKey !== null) {
          notes.push({ drum: true, key: drumKey, durWhole });
        } else {
          const origMidi = Math.round(freqToMidi(n.Pitch.Frequency)) - transposeSemitones;
          const staffBucket = noteStaffByMidi[origMidi];
          const staff = (staffBucket && findNearestEntry(staffBucket, tWhole, MARK_MATCH_EPSILON)) || 1;
          notes.push({ freq: n.Pitch.Frequency, durWhole, staff });
        }
      }
    }
    const arpInfo = findNearestEntry(arpEntries, tWhole, MARK_MATCH_EPSILON);
    let arpCount = 0, arpGapBeforeWhole = null;
    if (arpInfo && notes.length > 1) {
      // 依編號分組:同編號=同一條線(可能跨手,一起滾奏);不同編號=各自獨立的線(例如左右手分開,但要同時起始)
      const groupNums = Object.keys(arpInfo.groups);
      const byGroup = {};
      for (const gn of groupNums) byGroup[gn] = [];
      for (const n of notes) {
        if (n.drum || !n.freq) continue;
        const origMidi = Math.round(freqToMidi(n.freq)) - transposeSemitones;
        const noteKey = origMidi + "_" + (n.staff || 1);
        for (const gn of groupNums) {
          if (arpInfo.groups[gn].notes.has(noteKey)) { byGroup[gn].push(n); break; }
        }
      }
      const activeGroups = groupNums.filter(gn => byGroup[gn].length > 1);
      if (activeGroups.length === 1) {
        // 只有一組(可能是跨手單一條線,或只有一手有琶音):維持原本邏輯,最後一個音準時落在拍點上
        const gn = activeGroups[0];
        const pitched = byGroup[gn];
        const dir = arpInfo.groups[gn].direction;
        pitched.sort((a, b) => dir === "down" ? b.freq - a.freq : a.freq - b.freq);
        const n = pitched.length;
        pitched.forEach((note, i) => { note.rollIndex = i - (n - 1); });
        arpCount = n;
      } else if (activeGroups.length > 1) {
        // 多組獨立的線(例如左右手分開的兩條琶音):每一組各自的第一個音要同時起始,
        // 用最長的那一組當基準,其他組跟著對齊起始點,不是全部混在一起滾奏
        const maxSize = Math.max(...activeGroups.map(gn => byGroup[gn].length));
        for (const gn of activeGroups) {
          const pitched = byGroup[gn];
          const dir = arpInfo.groups[gn].direction;
          pitched.sort((a, b) => dir === "down" ? b.freq - a.freq : a.freq - b.freq);
          pitched.forEach((note, i) => { note.rollIndex = i - (maxSize - 1); });
        }
        arpCount = maxSize;
      }
      if (arpCount > 0) {
        arpGapBeforeWhole = tWhole - (events.length ? events[events.length - 1].tWhole : tWhole);
      }
    }
    events.push({ tWhole, x, notes, arpCount, arpGapBeforeWhole, arpGapAfterWhole: null });
    cursor.next();
  }
  // 補上每個事件跟下一個事件的全音符間距,琶音邊界偵測要用(前面那一步只知道跟前一個事件的間距)
  for (let i = 0; i < events.length; i++) {
    if (events[i].arpCount > 0) {
      events[i].arpGapAfterWhole = (i + 1 < events.length) ? events[i + 1].tWhole - events[i].tWhole : Infinity;
    }
  }
  // 踏板範圍:只用樂譜裡明確的踏板記號(拍長猜測準確率太低,已移除)
  for (const ev of events) {
    ev.pedalOn = inRanges(ev.tWhole, pedalRanges);
    ev.legato = !ev.pedalOn && inRanges(ev.tWhole, slurRanges);
    // 記錄這個音符所屬和聲/圓滑線範圍的結束時間點,讓同一組和聲裡的音符都能撐滿整個和聲的長度
    const activeRanges = ev.pedalOn ? pedalRanges : (ev.legato ? slurRanges : null);
    let rangeEnd = null;
    if (activeRanges) {
      for (const r of activeRanges) {
        if (ev.tWhole >= r.start && ev.tWhole < r.end) { rangeEnd = r.end; break; }
      }
    }
    // 左手(或任一手)重複分解和弦音型偵測到的範圍,也當作和聲延伸的依據
    for (const r of repeatChordRanges) {
      if (ev.tWhole >= r.start && ev.tWhole < r.end) { rangeEnd = rangeEnd != null ? Math.max(rangeEnd, r.end) : r.end; break; }
    }
    // 同一時刻裡,只要有更長時值的音符(例如左手四拍和絃),其他較短的音符(例如右手旋律音)
    // 就延長撐滿到那個最長時值的音符結束為止,不用判斷和聲、純粹看樂譜上寫的時值
    const maxDurWhole = ev.notes.length ? Math.max(...ev.notes.map(n => n.durWhole)) : 0;
    const coChordEnd = ev.tWhole + maxDurWhole;
    ev.harmonyEndWhole = rangeEnd != null ? Math.max(rangeEnd, coChordEnd) : coChordEnd;
    ev.artic = findNearestEntry(articEntries, ev.tWhole, MARK_MATCH_EPSILON) || null;
  }
  // 終點
  const lastEv = events[events.length-1];
  const lastDur = lastEv && lastEv.notes.length
    ? Math.max(...lastEv.notes.map(n=>n.durWhole)) : 0.25;
  totalWhole = (lastEv ? lastEv.tWhole : 0) + lastDur;
  endX = lastX + 120;
  cursor.hide();
}

/* ── 鼓譜偵測 ─────────────────────────────── */
function isPercussionInstrument(instr){
  if (!instr || !instr.SubInstruments) return false;
  return instr.SubInstruments.some(s => s.fixedKey > 0);
}
function getDrumKey(n){
  let instr = null;
  try { instr = n.ParentVoiceEntry.ParentVoice.Parent; } catch(e){}
  if (!isPercussionInstrument(instr)) return null;
  // 1) 優先:MusicXML midi-unpitched(Sibelius 鼓組會寫入)
  const pid = n.PlaybackInstrumentId || n.playbackInstrumentId;
  if (pid) {
    const sub = instr.SubInstruments.find(s => s.idString === pid);
    if (sub && sub.fixedKey > 0) return normalizeDrumKey(sub.fixedKey);
  }
  // 2) 備援:標準爵士鼓記譜位置(顯示音高 → GM)
  const midi = n.Pitch.getHalfTone ? n.Pitch.getHalfTone() + 12 : (n.Pitch.halfTone + 12);
  const posMap = { 64:36, 65:36, 67:41, 69:43, 72:38, 74:47, 76:48, 77:51, 79:42, 81:49 };
  return posMap[midi] || 38;
}
function normalizeDrumKey(k){
  // MusicXML midi-unpitched 為 1–128;若落在 GM 打擊區間直接用,否則減 1 修正
  if (k >= 35 && k <= 81) return k;
  if (k - 1 >= 35 && k - 1 <= 81) return k - 1;
  return 38;
}

/* ── 時間換算 ─────────────────────────────── */
function bpm(){ return parseInt($("tempo").value, 10); }
function wholeToSec(w){ return w * 240 / bpm(); }   // 1 全音符 = 4 拍
function totalSec(){
  if ($("useCalibration").checked && calibrationMap.length >= 2) return calibrationMap[calibrationMap.length-1].realSec;
  return wholeToSec(totalWhole);
}

/* ── 校準時間換算(tap-along / 自動拍點偵測共用) ── */
function calibToSec(w){
  const m = calibrationMap;
  if (m.length < 2) return wholeToSec(w);
  if (w <= m[0].tWhole) {
    const slope = (m[1].realSec - m[0].realSec) / Math.max(m[1].tWhole - m[0].tWhole, 1e-6);
    return m[0].realSec + (w - m[0].tWhole) * slope;
  }
  for (let i = 0; i < m.length - 1; i++) {
    const a = m[i], b = m[i+1];
    if (w >= a.tWhole && w <= b.tWhole) {
      const f = (w - a.tWhole) / Math.max(b.tWhole - a.tWhole, 1e-6);
      return a.realSec + (b.realSec - a.realSec) * f;
    }
  }
  const last = m[m.length-1], prev = m[m.length-2];
  const slope = (last.realSec - prev.realSec) / Math.max(last.tWhole - prev.tWhole, 1e-6);
  return last.realSec + (w - last.tWhole) * slope;
}
function calibSecToWhole(sec){
  const m = calibrationMap;
  if (m.length < 2) return sec * bpm() / 240;
  if (sec <= m[0].realSec) {
    const slope = (m[1].tWhole - m[0].tWhole) / Math.max(m[1].realSec - m[0].realSec, 1e-6);
    return m[0].tWhole + (sec - m[0].realSec) * slope;
  }
  for (let i = 0; i < m.length - 1; i++) {
    const a = m[i], b = m[i+1];
    if (sec >= a.realSec && sec <= b.realSec) {
      const f = (sec - a.realSec) / Math.max(b.realSec - a.realSec, 1e-6);
      return a.tWhole + (b.tWhole - a.tWhole) * f;
    }
  }
  const last = m[m.length-1], prev = m[m.length-2];
  const slope = (last.tWhole - prev.tWhole) / Math.max(last.realSec - prev.realSec, 1e-6);
  return last.tWhole + (sec - last.realSec) * slope;
}
function useCalib(){ return $("useCalibration").checked && calibrationMap.length >= 2; }

/* ── 校準用的「現在時間」:有上傳錄音就跟著錄音播放位置走,否則用碼表 ── */
function nowRealSec(){
  const a = $("calibAudio");
  if (a && a.src) return a.currentTime;
  return (performance.now() - calibStartPerf) / 1000;
}

/* ── 音頭(onset)偵測:抓音量包絡線突然上升的瞬間,不做音高辨識 ── */
function mixDownChannels(buf){
  const len = buf.length;
  const out = new Float32Array(len);
  for (let c = 0; c < buf.numberOfChannels; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < len; i++) out[i] += ch[i] / buf.numberOfChannels;
  }
  return out;
}
function detectOnsets(buf){
  const data = buf.numberOfChannels > 1 ? mixDownChannels(buf) : buf.getChannelData(0);
  const sr = buf.sampleRate;
  const hop = Math.round(sr * 0.01);
  const win = Math.round(sr * 0.03);
  const frames = Math.max(0, Math.floor((data.length - win) / hop));
  const energy = new Float32Array(frames);
  for (let i = 0; i < frames; i++) {
    let sum = 0;
    const start = i * hop;
    for (let j = 0; j < win; j++) { const v = data[start + j]; sum += v * v; }
    energy[i] = Math.sqrt(sum / win);
  }
  const flux = new Float32Array(frames);
  for (let i = 1; i < frames; i++) flux[i] = Math.max(0, energy[i] - energy[i-1]);
  const onsets = [];
  const minGapFrames = Math.max(1, Math.round(0.08 * sr / hop));
  let lastOnsetFrame = -minGapFrames;
  const localWin = 20;
  for (let i = 2; i < frames - 1; i++) {
    const lo = Math.max(0, i - localWin), hi = Math.min(frames, i + localWin);
    let sum = 0; for (let k = lo; k < hi; k++) sum += flux[k];
    const localAvg = sum / (hi - lo);
    const isPeak = flux[i] > flux[i-1] && flux[i] >= flux[i+1];
    if (isPeak && flux[i] > localAvg * 1.6 + 0.001 && (i - lastOnsetFrame) >= minGapFrames) {
      onsets.push(i * hop / sr);
      lastOnsetFrame = i;
    }
  }
  return onsets;
}

    const audioBuf = await audioCtx.decodeAudioData(arr);
    const onsets = detectOnsets(audioBuf);
    calibrationMap = [];
    const n = Math.min(onsets.length, events.length);
    for (let i = 0; i < n; i++) calibrationMap.push({ tWhole: events[i].tWhole, realSec: onsets[i] });

}

$("calibStartBtn").addEventListener("click", () => {

  calibrationMap.push({ tWhole: ev.tWhole, realSec });

});

function finishCalibration(){

  $("calibUndoBtn").disabled = false;
  $("calibFinishBtn").disabled = false;
  updateCalibStatus();
  const ev = events[idx];

function updateTransposeLabel(){
  $("transVal").textContent = transposeSemitones === 0
    ? "原調"
    : (transposeSemitones > 0 ? "+" : "") + transposeSemitones + " 半音";
}
async function applyTranspose(delta){
  if (!lastXmlText) return;
  const next = transposeSemitones + delta;
  if (next < -12 || next > 12) return; // 超過一個八度沒有實用意義,避免調號離譜
  transposeSemitones = next;
  updateTransposeLabel();
  const wasPlaying = playing;
  const at = wasPlaying ? currentSec() : pausedAtSec;
  stopPlayback();
  setStatus("移調中…");
  await renderScore(lastXmlText);
  pausedAtSec = at;
  updateTimeLabel(at);
  setStatus(transposeSemitones === 0 ? "已還原原調" : "已移調 " + $("transVal").textContent);
  if (wasPlaying) startPlayback(at);
}

/* ── 播放控制 ─────────────────────────────── */
$("playBtn").addEventListener("click", () => {
  if (!events.length) return;
  if (playing) { pausePlayback(); } else { startPlayback(pausedAtSec); }
});
$("stopBtn").addEventListener("click", stopPlayback);

function ensureAudio(){
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function startPlayback(fromSec){
  ensureAudio();
  playing = true;
  $("playBtn").textContent = "❚❚ 暫停";
  startAudioFrom(fromSec || 0);
  rafId = requestAnimationFrame(tick);
}

function startAudioFrom(fromSec){
  startCtxTime = audioCtx.currentTime - fromSec;
  scheduled = [];
  const calib = useCalib();
  let errCount = 0, lastErr = null;
  for (const ev of events) {
    const t = calib ? calibToSec(ev.tWhole) : wholeToSec(ev.tWhole);
    if (t < fromSec - 0.02) continue;
    const chordAnchors = {};
    const harmonyEndSec = ev.harmonyEndWhole != null
      ? startCtxTime + (calib ? calibToSec(ev.harmonyEndWhole) : wholeToSec(ev.harmonyEndWhole))
      : null;
    for (const n of ev.notes) {
      try {
        const rollT = (n.rollIndex || 0) * computeArpEffectiveGap(ev, t, calib);
        const durSec = calib ? Math.max(calibToSec(ev.tWhole + n.durWhole) - t, 0.05) : wholeToSec(n.durWhole);
        if (n.drum) scheduleDrum(n.key, startCtxTime + t + rollT);
        else scheduleNote(n.freq, startCtxTime + t + rollT, durSec, ev.legato, ev.pedalOn, chordAnchors, harmonyEndSec, ev.artic);
      } catch (e) {
        errCount++; lastErr = e;
        console.error("排程音符失敗:", e);
      }
    }
  }
  if (errCount) setStatus("警告:" + errCount + " 個音符排程失敗(" + (lastErr && lastErr.message || "") + ")");
}

  strings:  { folder: "violin",          minOct: 2, maxOct: 7 },
